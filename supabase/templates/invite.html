<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="dark">
  <meta name="supported-color-schemes" content="dark">
  <title>Grimoire</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background-color: #141210; font-family: 'Cormorant Garamond', Georgia, serif; color: #EDE7DD; -webkit-font-smoothing: antialiased;">

  <!-- Outer Wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #141210;">
    <tr>
      <td style="padding: 40px 16px;">

        <!-- Inner Container -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="max-width: 600px; margin: 0 auto;">

          <!-- Header: Wordmark -->
          <tr>
            <td style="text-align: center; padding-bottom: 32px;">
              <h1 style="margin: 0 0 12px 0; font-family: 'Cinzel Decorative', 'Cinzel', Georgia, serif; font-size: 32px; font-weight: 400; color: #EDE7DD; letter-spacing: 0.08em;">Grimoire</h1>
              <!-- Gold divider line -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">
                <tr>
                  <td style="width: 60px; height: 1px; background-color: #C4A35A;"></td>
                  <td style="width: 12px; text-align: center; color: #C4A35A; font-size: 10px; line-height: 1;">&#10022;</td>
                  <td style="width: 60px; height: 1px; background-color: #C4A35A;"></td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Content Card -->
          <tr>
            <td>
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #1E1C19; border: 1px solid #36322C; border-radius: 12px;">
                <tr>
                  <td style="padding: 40px 36px;">

                    <!-- Decorative star -->
                    <p style="margin: 0 0 24px 0; text-align: center; color: #C4A35A; font-size: 18px; letter-spacing: 0.3em;">&#10022;</p>

                    <!-- Heading -->
                    <h2 style="margin: 0 0 20px 0; font-family: 'Cinzel', Georgia, serif; font-size: 24px; font-weight: 600; color: #EDE7DD; text-align: center; letter-spacing: 0.04em;">An Invitation</h2>

                    <!-- Body text -->
                    <p style="margin: 0 0 32px 0; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 18px; font-weight: 400; color: #EDE7DD; line-height: 1.6; text-align: center;">
                      A seat has been prepared for you in the Grimoire &mdash; a place for readings, reflection, and ritual. Accept below to take your place.
                    </p>

                    <!-- CTA Button (bulletproof) -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">
                      <tr>
                        <td style="border-radius: 8px; background-color: #5C8A6B;">
                          <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 14px 40px; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 17px; font-weight: 600; color: #EDE7DD; text-decoration: none; border-radius: 8px; letter-spacing: 0.03em;">Accept</a>
                        </td>
                      </tr>
                    </table>

                    <!-- Fallback link -->
                    <p style="margin: 28px 0 0 0; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; color: #585149; text-align: center; line-height: 1.5;">
                      Or copy this link:<br>
                      <a href="{{ .ConfirmationURL }}" target="_blank" style="color: #9A9185; text-decoration: underline; word-break: break-all;">{{ .ConfirmationURL }}</a>
                    </p>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top: 32px; text-align: center;">
              <p style="margin: 0 0 8px 0; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 15px; font-style: italic; color: #585149; line-height: 1.5;">
                The cards reflect; they do not dictate.
              </p>
              <p style="margin: 0; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; color: #3D3830;">
                Grimoire &middot; {{ .SiteURL }}
              </p>
            </td>
          </tr>

        </table>
        <!-- /Inner Container -->

      </td>
    </tr>
  </table>
  <!-- /Outer Wrapper -->

</body>
</html>
